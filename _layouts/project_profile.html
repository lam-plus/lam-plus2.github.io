---
layout: default
---

<article class="project-profile">
  {% if page.header.overlay_image %}
    <section class="project-hero" style="--project-bg: url('{{ page.header.overlay_image | relative_url }}'); --project-overlay: {{ page.header.overlay_filter | default: 0.4 }};">
      <div class="project-hero-overlay">
        <h1>{{ page.title }}</h1>
      </div>
    </section>
  {% else %}
    <h1>{{ page.title }}</h1>
  {% endif %}

  <div class="project-content">
    {{ content }}
  </div>
</article>
