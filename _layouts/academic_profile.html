---
layout: default
---

<article class="academic-profile">
  <header class="profile-header">
    {% if page.avatar %}
      <img src="{{ page.avatar | relative_url }}" alt="{{ page.title }}" class="profile-avatar">
    {% endif %}

    <div class="profile-meta">
      <h1>{{ page.title }}</h1>
      {% if page.role %}<p>{{ page.role }}</p>{% endif %}
      {% if page.affiliation %}<p>{{ page.affiliation }}</p>{% endif %}
      {% if page.location %}<p>{{ page.location }}</p>{% endif %}
    </div>
  </header>

  <section class="profile-content">
    {{ content }}
  </section>
</article>
